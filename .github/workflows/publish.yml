name: Publish to PyPI & npm

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Publish to npm
        run: npm publish
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-mcpb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Build MCPB bundle
        run: uv run neurostack bundle --output dist
      - uses: actions/upload-artifact@v4
        with:
          name: mcpb-bundle
          path: dist/*.mcpb

  create-release:
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-npm, build-mcpb]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcpb-bundle
          path: dist
      - name: Create GitHub Release with MCPB bundle
        run: |
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — uploading assets"
            gh release upload "$GITHUB_REF_NAME" dist/*.mcpb --clobber
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --latest dist/*.mcpb
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
